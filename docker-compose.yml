services:
  rembg-api:
    build: .
    image: local/rembg-openai-api:latest
    container_name: rembg-api
    ports:
      - "8000:8000"
    environment:
      U2NET_HOME: /models
      DEFAULT_MODEL: u2netp
      MAX_SESSIONS: "4"
      MAX_IMAGE_BYTES: "26214400"
      MAX_DIMENSION: "4096"
      FILE_TTL_SECONDS: "3600"
      MAX_FILE_STORE_ITEMS: "64"
      MAX_FILE_STORE_BYTES: "268435456"
      MAX_CONCURRENT: "2"
      PUBLIC_BASE_URL: http://localhost:8000
      # API_KEY: sk-xxx
    volumes:
      - ./models:/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
